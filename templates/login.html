<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsyncX | Hackathon Challenge Box</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #0f0f0f;
            --accent-color: #00f2ff;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: #1f1f1f;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        .contractor-brand {
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 2rem;
            background: linear-gradient(90deg, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background-color: #151515;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(0, 242, 255, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
            margin-top: 1rem;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .footer-logo {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .footer-logo span {
            color: var(--accent-color);
            font-weight: bold;
        }

        .btn-secondary {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 1rem;
            background-color: transparent;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            box-sizing: border-box; /* Garante que o padding não estoure a largura */
        }

        .btn-secondary:hover {
            background-color: rgba(0, 242, 255, 0.1);
            transform: translateY(-1px);
        }

        .btn-secondary:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="contractor-brand">Ambiente Restrito</div>
        <h1>HCB Platform</h1>
        
        <form action="/login" method="post">
            <div class="input-group">
                <input type="text" name="name" placeholder="ID do Time" required autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Código de Acesso" required>
            </div>
            <button type="submit">Entrar</button>
        </form>
        <a href="/leaderboard" class="btn-secondary">Acompanhar Placar</a>

        <div class="footer-logo">
            Desenvolvido por <span>ASYNCX</span>
        </div>
    </div>

</body>
</html>
